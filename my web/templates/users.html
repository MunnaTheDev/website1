<!DOCTYPE html>
<html>
<head>
    <title>Users</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        table {
            width: 80%;
            margin: auto;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border: 1px solid #333;
        }

        th {
            background: #00d9ff;
            color: black;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        .back {
            margin-top: 20px;
            display: inline-block;
            color: #00d9ff;
        }
    </style>
</head>
<body>

<h1>USER DATABASE</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>{{ user[2] }}</td>
        <td><a href="/delete/{{ user[0] }}">Delete</a></td>
    </tr>
    {% endfor %}
</table>

<br>
<a class="back" href="/">← Back</a>

</body>
</html>
